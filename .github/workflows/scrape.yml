name: Update TV Channels Data

on:
  schedule:
    - cron: '0 */12 * * *' # يعمل كل 12 ساعة تلقائياً
  workflow_dispatch: # زر التشغيل اليدوي

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # تم التحديث لحل مشكلة File is not defined

      - name: Install dependencies
        run: |
          npm init -y
          npm install axios cheerio sharp

      - name: Run Scraper
        run: node scraper.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add channels.json image/*.jpg
          git commit -m "Update: Channels list and images $(date)" || echo "No changes to commit"
          git push
