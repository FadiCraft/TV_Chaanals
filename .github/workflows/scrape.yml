name: TV Channels Auto Scraper

on:
  schedule:
    - cron: '0 */12 * * *' # يعمل تلقائياً كل 12 ساعة
  workflow_dispatch: # زر التشغيل اليدوي من تبويب Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install NPM Dependencies
        run: |
          npm init -y
          npm install axios cheerio sharp fluent-ffmpeg

      - name: Run Scraper
        run: node scraper.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add channels.json image/*.jpg
          git commit -m "Auto-update: Channels check $(date)" || echo "No changes to commit"
          git push
