name: TV Channels Auto Scraper

on:
  schedule:
    - cron: '0 */12 * * *' # تحديث كل 12 ساعة
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # تم إزالة سطر الـ cache لحل المشكلة

      - name: Install Dependencies
        run: |
          npm init -y
          npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer axios sharp cheerio

      - name: Run Scraper
        run: node scraper.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add channels.json image/*.jpg
          git commit -m "Auto-update channels: $(date)" || echo "No changes to commit"
          git push
