name: استخراج قنوات Yalla TV

on:
  schedule:
    - cron: '0 */12 * * *' # تحديث تلقائي كل 12 ساعة
  workflow_dispatch: # زر للتشغيل اليدوي

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install axios cheerio sharp fluent-ffmpeg puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Install Chrome Browser for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run Scraper
        run: node scraper.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global core.quotePath false

          # تأكد من إضافة الملف الصحيح الناتج عن السكريبت
          git add channels_yalla.json image/*.webp || true
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "لا توجد تغييرات جديدة للمزامنة."
            exit 0
          fi

          git commit -m "Auto-update YallaTV channels: $(date)"
          git pull --rebase -X ours origin main
          git push origin main
