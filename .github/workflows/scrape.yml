name: استخراج قنوات Yalla TV المطور

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth cheerio axios sharp

      - name: Install Chrome Browser
        run: npx puppeteer browsers install chrome

      - name: Run Scraper
        run: node scraper.js

      - name: Upload Debug Screenshot (If Failed)
        if: failure() || always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug-*.png

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global core.quotePath false
          git add channels_yalla.json
          git add image/*.webp || echo "No images"
          if git diff --quiet && git diff --staged --quiet; then
            echo "لا توجد تغييرات."
            exit 0
          fi
          git commit -m "Auto-update: $(date)"
          git pull --rebase -X ours origin main
          git push origin main
