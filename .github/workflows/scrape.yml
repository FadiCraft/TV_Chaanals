name: TV Channels Auto Scraper & Merger

on:
  schedule:
    - cron: '0 */12 * * *' # كل 12 ساعة
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install axios cheerio sharp fluent-ffmpeg

      - name: Run Scraper
        run: node scraper.js

      - name: Run Merger (Add IDs)
        run: |
          node -e "
          const fs = require('fs');
          const files = ['channels1.json', 'channels2.json', 'channels3.json'];
          let all = [];
          files.forEach(f => {
            if(fs.existsSync(f)) {
              const d = JSON.parse(fs.readFileSync(f, 'utf8'));
              if(Array.isArray(d)) all = all.concat(d);
            }
          });
          const result = all.map((item, i) => ({ id: i + 1, ...item }));
          fs.writeFileSync('all_channels.json', JSON.stringify(result, null, 2), 'utf8');
          "

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global core.quotePath false

          # سحب أي تغييرات خارجية أولاً بأمان
          git pull origin main --rebase

          # إضافة كل الملفات الناتجة (الصور والملف المدمج)
          git add image/*.jpg all_channels.json channels1.json channels2.json channels3.json
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "لا توجد تغييرات جديدة."
          else
            git commit -m "Auto-update & Merge: $(date)"
            git push origin main
          fi
