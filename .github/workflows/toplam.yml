name: تجميع الملفات

on:
  schedule:
    # سيتم التشغيل يومياً الساعة 12 منتصف الليل بتوقيت UTC
    - cron: '0 0 * * *'
  
  # يتيح لك تشغيل السكريبت يدوياً من صفحة Actions
  workflow_dispatch:

jobs:
  merge-job:
    runs-on: ubuntu-latest
    
    # للتأكد من أن الـ Action لديه صلاحية الكتابة في المستودع
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge JSON Files and Add ID
        run: |
          node -e "
          const fs = require('fs');
          
          // أسماء الملفات كما تظهر في صورتك
          const inputFiles = ['channels1.json', 'channels2.json', 'channels3.json'];
          const outputFile = 'all_channels.json';
          let allChannels = [];

          console.log('--- بدء عملية الدمج ---');

          inputFiles.forEach(file => {
            if (fs.existsSync(file)) {
              try {
                const rawData = fs.readFileSync(file, 'utf8').trim();
                if (rawData) {
                  const jsonData = JSON.parse(rawData);
                  if (Array.isArray(jsonData)) {
                    console.log('✅ تم العثور على ' + jsonData.length + ' قناة في: ' + file);
                    allChannels = allChannels.concat(jsonData);
                  } else {
                    console.log('⚠️ الملف ' + file + ' ليس مصفوفة (Array).');
                  }
                } else {
                  console.log('⚠️ الملف ' + file + ' فارغ تماماً.');
                }
              } catch (err) {
                console.error('❌ خطأ في قراءة ' + file + ': ' + err.message);
              }
            } else {
              console.log('❌ الملف غير موجود: ' + file);
            }
          });

          if (allChannels.length > 0) {
            // إعادة بناء الكائنات لإضافة ID في البداية
            const finalData = allChannels.map((item, index) => ({
              id: index + 1,
              ...item
            }));

            fs.writeFileSync(outputFile, JSON.stringify(finalData, null, 2), 'utf8');
            console.log('🚀 نجاح: تم دمج ' + finalData.length + ' قناة في ' + outputFile);
          } else {
            console.log('🛑 فشل: لم يتم العثور على أي بيانات لدمجها.');
            // نترك الملف كما هو أو ننشئ مصفوفة فارغة إذا كنت تفضل ذلك
            if (!fs.existsSync(outputFile)) fs.writeFileSync(outputFile, '[]', 'utf8');
          }
          "

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add all_channels.json
          # لن يفشل الأكشن إذا لم تكن هناك تغييرات جديدة
          git commit -m "Auto-update: Merged channels ($(date +'%Y-%m-%d'))" || exit 0
          git push
