name: تجميع الملفات المطور

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  merge-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge JSON Files (Advanced Logic)
        run: |
          node -e "
          const fs = require('fs');
          const files = ['channels1.json', 'channels2.json', 'channels.json'];
          const outputFile = 'all_channels.json';
          const mergedChannels = {};
          const seenUrls = new Set();

          console.log('--- بدء عملية الدمج المتقدمة ---');

          files.forEach((fileName, index) => {
              if (fs.existsSync(fileName)) {
                  try {
                      const content = fs.readFileSync(fileName, 'utf8').trim();
                      if (!content) return;
                      let data = JSON.parse(content);

                      if (Array.isArray(data)) {
                          data.forEach(ch => {
                              // التحقق من الاسم، الصورة الأصلية، والارتباط
                              if (ch.name && ch.original_img && ch.original_img.trim() !== '' && ch.server_url) {
                                  // التحقق من عدم تكرار الرابط (URL)
                                  if (!seenUrls.has(ch.server_url)) {
                                      if (!mergedChannels[ch.name]) {
                                          mergedChannels[ch.name] = {
                                              ...ch,
                                              steem1: '',
                                              steem2: '',
                                              steem3: ''
                                          };
                                          delete mergedChannels[ch.name].server_url;
                                      }
                                      const serverKey = 'steem' + (index + 1);
                                      mergedChannels[ch.name][serverKey] = ch.server_url;
                                      seenUrls.add(ch.server_url);
                                  }
                              }
                          });
                      }
                  } catch (error) {
                      console.error('❌ خطأ في ' + fileName + ': ' + error.message);
                  }
              }
          });

          const finalResult = Object.values(mergedChannels).map((ch, idx) => {
              let servers = [ch.steem1, ch.steem2, ch.steem3].filter(s => s && s.trim() !== '');
              return {
                  id: idx + 1,
                  name: ch.name,
                  category: ch.category,
                  local_img: ch.local_img,
                  original_img: ch.original_img,
                  status: ch.status,
                  last_update: ch.last_update,
                  steem1: servers[0] || '',
                  steem2: servers[1] || '',
                  steem3: servers[2] || ''
              };
          });

          if (finalResult.length > 0) {
              fs.writeFileSync(outputFile, JSON.stringify(finalResult, null, 4), 'utf8');
              console.log('🚀 نجاح: تم دمج ' + finalResult.length + ' قناة فريدة.');
          } else {
              console.log('🛑 لم يتم العثور على بيانات صالحة للدمج.');
          }
          "

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add all_channels.json
          git commit -m "Auto-update: Smart Merge and Deduplicate ($(date +'%Y-%m-%d'))" || exit 0
          git push
