name: تجميع الملفات المطور

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  merge-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge JSON Files
        run: |
          node -e "
          const fs = require('fs');
          const inputFiles = ['channels1.json', 'channels2.json', 'channels.json'];
          const outputFile = 'all_channels.json';
          
          let rawData = [];
          
          // 1. جمع كل البيانات من كل الملفات أولاً
          inputFiles.forEach(file => {
              if (fs.existsSync(file)) {
                  try {
                      const content = JSON.parse(fs.readFileSync(file, 'utf8'));
                      if (Array.isArray(content)) rawData = rawData.concat(content);
                  } catch (e) {}
              }
          });

          // 2. منطق الفلترة: المفتاح هو الـ server_url
          const uniqueByUrl = {};

          rawData.forEach(ch => {
              const url = ch.server_url;
              if (!url) return;

              // إذا كان الرابط جديداً، أو الرابط موجوداً لكن القناة الحالية لديها صورة والقديمة لا
              if (!uniqueByUrl[url] || (!uniqueByUrl[url].original_img && ch.original_img)) {
                  uniqueByUrl[url] = ch;
              }
          });

          // 3. تحويل النتائج لمصفوفة وإضافة الـ ID
          const finalResult = Object.values(uniqueByUrl).map((ch, idx) => ({
              id: idx + 1,
              ...ch
          }));

          fs.writeFileSync(outputFile, JSON.stringify(finalResult, null, 4), 'utf8');
          console.log('🚀 تم الحفظ! القنوات النهائية: ' + finalResult.length);
          "

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add all_channels.json
          git commit -m "Auto-update: Merge and Deduplicate by URL ($(date +'%Y-%m-%d'))" || exit 0
          git push
